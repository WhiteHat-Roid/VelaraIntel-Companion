<!DOCTYPE html>
<html style="background: transparent !important;">
<head>
  <meta charset="UTF-8">
  <title>Velara Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent !important;
      background-color: transparent !important;
      overflow: hidden;
      user-select: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }
    #badge {
      -webkit-app-region: drag;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(8, 10, 12, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(123, 47, 190, 0.4);
      box-shadow: 0 0 12px rgba(123, 47, 190, 0.2);
    }
    #badge .shield {
      width: 56px;
      height: 56px;
      object-fit: contain;
      pointer-events: none;
      filter: brightness(0.85);
    }
  </style>
</head>
<body>
  <div id="badge">
    <img class="shield" src="../../assets/icon.png" alt="">
  </div>
</body>
</html>
